<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>송남초 스쿨버스 실시간</title>
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: #f5f5f5; }
    .tabs { display: flex; background: white; padding: 10px; gap: 10px; position: sticky; top: 0; z-index: 20; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .tab { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 8px; text-align: center; font-weight: bold; cursor: pointer; }
    .tab.active { border-color: #4CAF50; background: #e8f5e9; color: #2e7d32; }
    .map-container { position: sticky; top: 58px; z-index: 5; width: 100%; height: 45vh; }
    #map { width: 100%; height: 100%; }
    .btn-find { position: absolute; bottom: 20px; right: 20px; z-index: 10; background: #FF9800; color: white; border: none; border-radius: 50%; width: 55px; height: 55px; font-size: 24px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
    .content { padding: 15px; }
    .stop-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .stop-item.active { border: 2px solid #2196F3; background: #e3f2fd; }
    .eta { margin-left: auto; text-align: right; font-weight: bold; color: #E53935; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=26741f440bd5957a0910a000675e4ca3"></script>
</head>
<body>
  <div class="tabs">
    <div class="tab active" id="t1" onclick="changeRoute('1호차', 't1')">🚌 1호차</div>
    <div class="tab" id="t2" onclick="changeRoute('2호차', 't2')">🚌 2호차</div>
  </div>
  <div class="map-container">
    <div id="map"></div>
    <button class="btn-find" onclick="focusBus()">🚌</button>
  </div>
  <div class="content" id="stopList"></div>

  <script>
    const firebaseConfig = {
  apiKey: "AIzaSyBgvf-DLS7yHRaQQo_VBuD8Iq0OFpJNbFY",
  authDomain: "schoolbus-d084b.firebaseapp.com",
  databaseURL: "https://schoolbus-d084b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "schoolbus-d084b",
  storageBucket: "schoolbus-d084b.firebasestorage.app",
  messagingSenderId: "827567571467",
  appId: "1:827567571467:web:b3ee5370e972bc05f1bd0e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let map, busMarker, currentBusPos, stopMarkers = [], currentRoute = "1호차", selectedIdx = -1;

    function initMap() {
      map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(36.82, 127.10), level: 4 });
      listenData();
    }

    function changeRoute(route, id) {
      currentRoute = route;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if(busMarker) busMarker.setMap(null); busMarker = null;
      stopMarkers.forEach(m => m.setMap(null)); stopMarkers = [];
      selectedIdx = -1;
      listenData();
    }

    function listenData() {
      db.ref('buses/' + currentRoute).on('value', (snap) => {
        const data = snap.val();
        if(data) {
          currentBusPos = new kakao.maps.LatLng(data.lat, data.lng);
          if(!busMarker) busMarker = new kakao.maps.Marker({ map: map, position: currentBusPos });
          else busMarker.setPosition(currentBusPos);
          if(selectedIdx !== -1) updateETA();
        }
      });
      db.ref('stops/' + currentRoute).on('value', (snap) => {
        const stops = []; snap.forEach(child => { stops.push(child.val()); });
        renderStops(stops);
      });
    }

    function renderStops(stops) {
      const list = document.getElementById('stopList');
      list.innerHTML = "";
      stops.forEach((s, i) => {
        const pos = new kakao.maps.LatLng(s.lat, s.lng);
        const m = new kakao.maps.Marker({ map: map, position: pos, opacity: 0.4 });
        stopMarkers.push(m);
        list.innerHTML += `<div class="stop-item" onclick="selectStop(${i}, ${s.lat}, ${s.lng})">
          <b>${i+1}. ${s.name}</b><div class="eta" id="eta-${i}"></div></div>`;
      });
    }

    function selectStop(i, lat, lng) {
      selectedIdx = i;
      map.panTo(new kakao.maps.LatLng(lat, lng));
      document.querySelectorAll('.stop-item').forEach(el => el.classList.remove('active'));
      event.currentTarget.classList.add('active');
      updateETA();
    }

    function updateETA() {
      // 직선거리 기반 ETA 계산 로직 (이전과 동일)
    }

    function focusBus() { if(currentBusPos) map.panTo(currentBusPos); }
    window.onload = initMap;
  </script>
</body>
</html>
