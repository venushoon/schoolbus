<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>스쿨버스 실시간 위치</title>
  <style>
    body { margin: 0; padding: 0; }
    #map { width: 100%; height: 100vh; }
    .info-box { position: absolute; top: 10px; left: 10px; z-index: 10; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-family: sans-serif;}
  </style>
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=26741f440bd5957a0910a000675e4ca3"></script>
</head>
<body>
  <div class="info-box">
    <strong>스쿨버스 위치 안내</strong><br>
    <small id="update-time">데이터 로딩 중...</small>
  </div>
  <div id="map"></div>

  <script>
    // ★ 방금 복사해둔 구글 앱스크립트 웹앱 URL을 여기에 붙여넣으세요 ★
    const GAS_URL = "https://script.google.com/macros/s/AKfycby6a3TgtSuqCdMxJZvVpZ6cSlpa-lUSoyk7xpiRLbzC6dAW_S3oAGDYqubM8DExRxyy/exec"; 
    
    let map, busMarker;
    const stopMarkers = [];

    function initMap() {
      const container = document.getElementById('map');
      const options = { center: new kakao.maps.LatLng(37.5665, 126.9780), level: 4 };
      map = new kakao.maps.Map(container, options);
      
      refreshData();
      setInterval(refreshData, 5000); // 5초마다 갱신
    }

    function refreshData() {
      // fetch를 사용해 구글 스크립트에 데이터 요청
      fetch(GAS_URL + "?action=getBusData")
        .then(response => response.json())
        .then(data => {
          const busPos = new kakao.maps.LatLng(data.bus.lat, data.bus.lng);
          
          if (!busMarker) {
            busMarker = new kakao.maps.Marker({ position: busPos, map: map, title: "스쿨버스" });
          } else {
            busMarker.setPosition(busPos);
          }
          
          if (stopMarkers.length === 0) {
            data.stops.forEach(stop => {
              const m = new kakao.maps.Marker({
                position: new kakao.maps.LatLng(stop.lat, stop.lng),
                map: map, title: stop.name, opacity: 0.6
              });
              stopMarkers.push(m);
            });
          }
          
          map.setCenter(busPos);
          document.getElementById('update-time').innerText = "최근 갱신: " + new Date(data.bus.lastUpdate).toLocaleTimeString();
        })
        .catch(error => console.error('Error:', error));
    }

    window.onload = initMap;
  </script>
</body>
</html>
