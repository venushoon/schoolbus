<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>송남초 스쿨버스 관리자</title>
  <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=26741f440bd5957a0910a000675e4ca3&libraries=services"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 20px; margin: 0; }
    .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; }
    @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    #map { width: 100%; height: 350px; border-radius: 8px; margin: 10px 0; border: 1px solid #ddd; }
    input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    .btn-main { background: #4CAF50; color: white; border: none; padding: 15px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; }
    .btn-save { background: #FF9800; margin-top: 10px; }
    .stop-item { display: flex; align-items: center; padding: 12px; background: #fff; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; }
    .stop-info { flex-grow: 1; margin: 0 10px; font-size: 14px; }
    .order-btn { padding: 4px 8px; cursor: pointer; background: #f0f0f0; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 2px; }
    .del-btn { background: #ffeded; color: #d32f2f; border: 1px solid #ffcdd2; padding: 8px; cursor: pointer; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <h1 style="text-align:center;">🚌 노선 관리자 (Firebase)</h1>
  <div class="container">
    <div class="card">
      <h2>📍 정류장 등록</h2>
      <select id="routeSelect" onchange="changeRoute()">
        <option value="1호차">1호차 편집</option>
        <option value="2호차">2호차 편집</option>
      </select>
      <input type="text" id="searchKeyword" placeholder="장소 검색..." onkeypress="if(event.keyCode==13) searchPlace();">
      <div id="map"></div>
      <input type="text" id="stopName" placeholder="정류장 이름">
      <input type="text" id="stopLat" readonly placeholder="위도">
      <input type="text" id="stopLng" readonly placeholder="경도">
      <button class="btn-main" onclick="addStop()">목록에 추가</button>
    </div>
    <div class="card">
      <h2>📋 노선 편집</h2>
      <div id="stopListArea">로딩 중...</div>
      <button class="btn-main btn-save" onclick="saveToFirebase()">✅ 서버 저장</button>
    </div>
  </div>

  <script>
    // ★ [5] 파이어베이스 설정값 입력 (위와 동일하게) ★
    const firebaseConfig = {
      apiKey: "AIzaSyBgvf-DLS7yHRaQQo_VBuD8Iq0OFpJNbFY",
      authDomain: "schoolbus-d084b.firebaseapp.com",
      databaseURL: "https://schoolbus-d084b-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "schoolbus-d084b",
      storageBucket: "schoolbus-d084b.firebasestorage.app",
      messagingSenderId: "827567571467",
      appId: "1:827567571467:web:b3ee5370e972bc05f1bd0e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let map, clickMarker, ps, currentStops = [], currentRoute = "1호차";

    function initMap() {
      map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(36.82, 127.10), level: 4 });
      ps = new kakao.maps.services.Places();
      clickMarker = new kakao.maps.Marker({ position: map.getCenter(), draggable: true });
      clickMarker.setMap(map);
      kakao.maps.event.addListener(map, 'click', e => updateInput(e.latLng));
      kakao.maps.event.addListener(clickMarker, 'dragend', () => updateInput(clickMarker.getPosition()));
      changeRoute();
    }

    function updateInput(ll) { clickMarker.setPosition(ll); document.getElementById('stopLat').value = ll.getLat(); document.getElementById('stopLng').value = ll.getLng(); }
    
    function searchPlace() {
      const kw = document.getElementById('searchKeyword').value;
      ps.keywordSearch(kw, (data, stat) => {
        if (stat === kakao.maps.services.Status.OK) {
          const loc = new kakao.maps.LatLng(data[0].y, data[0].x);
          map.setCenter(loc); updateInput(loc); document.getElementById('stopName').value = data[0].place_name;
        }
      });
    }

    function changeRoute() {
      currentRoute = document.getElementById('routeSelect').value;
      db.ref('stops/' + currentRoute).once('value', snap => { currentStops = snap.val() || []; renderList(); });
    }

    function renderList() {
      const area = document.getElementById('stopListArea'); area.innerHTML = '';
      currentStops.forEach((s, i) => {
        const item = document.createElement('div'); item.className = 'stop-item';
        item.innerHTML = `<div style="display:flex;flex-direction:column;"><button class="order-btn" onclick="move(${i},-1)">▲</button><button class="order-btn" onclick="move(${i},1)">▼</button></div><div class="stop-info"><b>${i+1}. ${s.name}</b></div><button class="del-btn" onclick="remove(${i})">삭제</button>`;
        area.appendChild(item);
      });
    }

    function addStop() {
      const n = document.getElementById('stopName').value; const la = document.getElementById('stopLat').value; const ln = document.getElementById('stopLng').value;
      if(!n || !la) return alert("정보를 입력하세요.");
      currentStops.push({ name: n, lat: Number(la), lng: Number(ln) }); renderList();
    }

    function move(idx, dir) { const target = idx + dir; if (target < 0 || target >= currentStops.length) return; [currentStops[idx], currentStops[target]] = [currentStops[target], currentStops[idx]]; renderList(); }
    function remove(idx) { if(confirm("삭제하시겠습니까?")) { currentStops.splice(idx, 1); renderList(); } }
    function saveToFirebase() { if(!confirm("저장하시겠습니까?")) return; db.ref('stops/' + currentRoute).set(currentStops).then(() => alert("저장 완료!")); }
    window.onload = initMap;
  </script>
</body>
</html>
