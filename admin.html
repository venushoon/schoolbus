<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>스쿨버스 관리자 페이지</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 600px) { .container { grid-template-columns: 1fr; } }
    
    .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    h2 { margin-top: 0; font-size: 18px; color: #333; }
    
    .search-box { display: flex; gap: 5px; margin-bottom: 10px; }
    
    #map { width: 100%; height: 300px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; }
    
    input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    input[readonly] { background: #eee; color: #666; }
    
    button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    button:hover { background: #45a049; }
    .btn-search { width: 80px; margin-bottom: 0; background: #333; }
    .btn-search:hover { background: #555; }
    .btn-refresh { background: #2196F3; margin-bottom: 15px; }
    
    .stop-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
    .delete-btn { width: auto; padding: 5px 10px; background: #E53935; font-size: 12px; }
    .delete-btn:hover { background: #c62828; }
  </style>
  
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=26741f440bd5957a0910a000675e4ca3&libraries=services"></script>
</head>
<body>

  <h1 style="text-align: center;">🚌 스쿨버스 노선 관리</h1>

  <div class="container">
    <div class="card">
      <h2>1. 새 정류장 추가</h2>
      <p style="font-size: 13px; color: #666; margin-bottom: 10px;">장소를 검색하거나 지도를 클릭하세요.</p>
      
      <div class="search-box">
        <input type="text" id="searchKeyword" placeholder="검색어 (예: 송남초, 아산시청)" style="margin-bottom: 0;" onkeypress="if(event.keyCode==13) searchPlace();">
        <button class="btn-search" onclick="searchPlace()">검색</button>
      </div>

      <div id="map"></div>
      
      <input type="text" id="stopName" placeholder="정류장 이름 (검색 시 자동 입력)">
      <input type="text" id="stopLat" placeholder="위도 (자동 입력)" readonly>
      <input type="text" id="stopLng" placeholder="경도 (자동 입력)" readonly>
      <button onclick="addStop()">노선에 추가하기</button>
    </div>

    <div class="card">
      <h2>2. 현재 등록된 노선</h2>
      <button class="btn-refresh" onclick="loadStops()">목록 새로고침</button>
      <div id="stopList">로딩 중...</div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby6a3TgtSuqCdMxJZvVpZ6cSlpa-lUSoyk7xpiRLbzC6dAW_S3oAGDYqubM8DExRxyy/exec";
    let map, clickMarker;
    let ps; // 장소 검색 객체

    function initMap() {
      const mapContainer = document.getElementById('map');
      const mapOption = { center: new kakao.maps.LatLng(36.82, 127.10), level: 4 };
      map = new kakao.maps.Map(mapContainer, mapOption);

      // 장소 검색 객체 초기화
      ps = new kakao.maps.services.Places();

      // 기존 기능: 지도 클릭 시 좌표 가져오기
      kakao.maps.event.addListener(map, 'click', function(mouseEvent) {
        const latlng = mouseEvent.latLng;
        setMarkerAndInputs(latlng.getLat(), latlng.getLng(), ""); // 클릭 시 이름은 비워둠
      });

      loadStops(); 
    }

    // 신규 기능: 장소 검색 실행 함수
    function searchPlace() {
      const keyword = document.getElementById('searchKeyword').value;
      if (!keyword.trim()) {
        alert('검색어를 입력해주세요!');
        return;
      }

      // 키워드로 장소를 검색합니다
      ps.keywordSearch(keyword, function(data, status, pagination) {
        if (status === kakao.maps.services.Status.OK) {
          // 검색된 첫 번째 결과의 좌표로 이동
          const lat = data[0].y;
          const lng = data[0].x;
          const placeName = data[0].place_name;

          map.setCenter(new kakao.maps.LatLng(lat, lng));
          setMarkerAndInputs(lat, lng, placeName);
          
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
          alert('검색 결과가 존재하지 않습니다.');
        } else {
          alert('검색 중 오류가 발생했습니다.');
        }
      });
    }

    // 마커 이동 및 입력창 자동 채우기 공통 함수
    function setMarkerAndInputs(lat, lng, name) {
      const coords = new kakao.maps.LatLng(lat, lng);
      
      if (!clickMarker) {
        clickMarker = new kakao.maps.Marker({ position: coords, map: map });
      } else {
        clickMarker.setPosition(coords);
      }
      
      document.getElementById('stopLat').value = lat;
      document.getElementById('stopLng').value = lng;
      
      // 검색으로 찾았을 경우 정류장 이름 칸도 자동으로 채워줍니다
      if(name) {
        document.getElementById('stopName').value = name;
      }
    }

    function loadStops() {
      document.getElementById('stopList').innerHTML = "로딩 중...";
      fetch(GAS_URL + "?action=getBusData")
        .then(res => res.json())
        .then(data => {
          const listDiv = document.getElementById('stopList');
          listDiv.innerHTML = '';
          
          if(data.stops.length === 0) {
            listDiv.innerHTML = "<p style='color:#999; text-align:center;'>등록된 정류장이 없습니다.</p>";
            return;
          }

          data.stops.forEach(stop => {
            listDiv.innerHTML += `
              <div class="stop-item">
                <div>
                  <strong>${stop.name}</strong><br>
                  <span style="font-size: 11px; color: #888;">${stop.lat.toFixed(4)}, ${stop.lng.toFixed(4)}</span>
                </div>
                <button class="delete-btn" onclick="deleteStop('${stop.name}')">삭제</button>
              </div>
            `;
          });
        });
    }

    function addStop() {
      const name = document.getElementById('stopName').value;
      const lat = document.getElementById('stopLat').value;
      const lng = document.getElementById('stopLng').value;

      if (!name || !lat || !lng) {
        alert("정류장 이름과 위치를 확인해주세요.");
        return;
      }

      const btn = event.target;
      btn.innerText = "추가 중...";
      
      const url = `${GAS_URL}?action=addStop&name=${encodeURIComponent(name)}&lat=${lat}&lng=${lng}`;
      
      fetch(url)
        .then(res => res.json())
        .then(data => {
          if(data.status === "Success") {
            alert("성공적으로 추가되었습니다.");
            document.getElementById('stopName').value = '';
            document.getElementById('searchKeyword').value = ''; // 검색창도 비움
            loadStops(); 
          }
          btn.innerText = "노선에 추가하기";
        });
    }

    function deleteStop(name) {
      if(!confirm(`'${name}' 정류장을 정말 삭제하시겠습니까?`)) return;

      const url = `${GAS_URL}?action=deleteStop&name=${encodeURIComponent(name)}`;
      fetch(url)
        .then(res => res.json())
        .then(data => {
          if(data.status === "Success") {
            loadStops(); 
          }
        });
    }

    window.onload = initMap;
  </script>
</body>
</html>
