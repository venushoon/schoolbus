<script>
  // 1. 노선 선택 시 해당 데이터를 실시간으로 가져옴
  function loadStops(route) {
    db.ref('stops/' + route).on('value', (snap) => {
      const data = [];
      snap.forEach(child => { data.push({ key: child.key, ...child.val() }); });
      renderList(data); // 위/아래 이동 버튼이 포함된 목록 렌더링
    });
  }

  // 2. 최종 저장 시 해당 노드(stops/1호차)를 전체 덮어쓰기
  function saveAll(route, dataArray) {
    db.ref('stops/' + route).set(dataArray);
  }
</script>
