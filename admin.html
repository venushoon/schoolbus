<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>송남초 스쿨버스 관리자</title>
  <style>
    body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
    
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
    h2 { margin-top: 0; color: #2c3e50; border-left: 5px solid #4CAF50; padding-left: 10px; }
    
    #map { width: 100%; height: 350px; border-radius: 8px; margin: 10px 0; border: 1px solid #ddd; }
    input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    input[readonly] { background: #f9f9f9; }
    
    .btn-main { background: #4CAF50; color: white; border: none; padding: 15px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; }
    .btn-save { background: #FF9800; margin-top: 10px; }

    .stop-item { 
      display: flex; align-items: center; padding: 12px; background: #fff; 
      border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px;
    }
    .stop-info { flex-grow: 1; margin: 0 10px; }
    .stop-name { font-weight: bold; display: block; }
    .stop-coords { font-size: 11px; color: #888; }
    
    .order-btns { display: flex; flex-direction: column; gap: 2px; }
    .order-btn { padding: 4px 8px; font-size: 12px; cursor: pointer; background: #f0f0f0; border: 1px solid #ccc; border-radius: 4px; }
    .del-btn { background: #ffeded; color: #d32f2f; border: 1px solid #ffcdd2; margin-left: 10px; padding: 8px; cursor: pointer; border-radius: 4px; }
  </style>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=26741f440bd5957a0910a000675e4ca3&libraries=services"></script>
</head>
<body>

  <h1 style="text-align:center;">🚌 노선 마스터 관리</h1>

  <div class="container">
    <div class="card">
      <h2>📍 정류장 등록/수정</h2>
      <input type="text" id="searchKeyword" placeholder="장소 검색..." onkeypress="if(event.keyCode==13) searchPlace();">
      <div id="map"></div>
      <input type="text" id="stopName" placeholder="정류장 명칭">
      <input type="text" id="stopLat" readonly placeholder="위도">
      <input type="text" id="stopLng" readonly placeholder="경도">
      <button class="btn-main" onclick="addStopToList()">목록에 임시 추가</button>
      <p style="font-size:12px; color:#666;">* 목록에서 순서를 조정한 후 아래 '최종 순서 저장'을 꼭 눌러주세요.</p>
    </div>

    <div class="card">
      <h2>📋 노선 순서 편집</h2>
      <div id="stopListArea">로딩 중...</div>
      <button class="btn-main btn-save" onclick="saveAllStopsToServer()">✅ 현재 순서로 최종 저장</button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby6a3TgtSuqCdMxJZvVpZ6cSlpa-lUSoyk7xpiRLbzC6dAW_S3oAGDYqubM8DExRxyy/exec";
    let map, clickMarker, ps;
    let currentStops = []; // 현재 화면에 표시된 정류장 배열

    function initMap() {
      const mapOption = { center: new kakao.maps.LatLng(36.82, 127.10), level: 4 };
      map = new kakao.maps.Map(document.getElementById('map'), mapOption);
      ps = new kakao.maps.services.Places();
      
      clickMarker = new kakao.maps.Marker({ position: map.getCenter(), draggable: true });
      clickMarker.setMap(map);

      kakao.maps.event.addListener(map, 'click', (e) => updateTarget(e.latLng));
      kakao.maps.event.addListener(clickMarker, 'dragend', () => updateTarget(clickMarker.getPosition()));

      loadStopsFromServer();
    }

    function updateTarget(latlng) {
      clickMarker.setPosition(latlng);
      document.getElementById('stopLat').value = latlng.getLat();
      document.getElementById('stopLng').value = latlng.getLng();
    }

    function searchPlace() {
      const kw = document.getElementById('searchKeyword').value;
      ps.keywordSearch(kw, (data, status) => {
        if (status === kakao.maps.services.Status.OK) {
          const loc = new kakao.maps.LatLng(data[0].y, data[0].x);
          map.setCenter(loc);
          updateTarget(loc);
          document.getElementById('stopName').value = data[0].place_name;
        }
      });
    }

    // 서버에서 불러오기
    function loadStopsFromServer() {
      fetch(GAS_URL + "?action=getBusData")
        .then(res => res.json())
        .then(data => {
          currentStops = data.stops;
          renderList();
        });
    }

    // 화면 목록 갱신
    function renderList() {
      const area = document.getElementById('stopListArea');
      area.innerHTML = '';
      currentStops.forEach((stop, i) => {
        const item = document.createElement('div');
        item.className = 'stop-item';
        item.innerHTML = `
          <div class="order-btns">
            <button class="order-btn" onclick="move(${i}, -1)">▲</button>
            <button class="order-btn" onclick="move(${i}, 1)">▼</button>
          </div>
          <div class="stop-info">
            <span class="stop-name">${i+1}. ${stop.name}</span>
            <span class="stop-coords">${Number(stop.lat).toFixed(4)}, ${Number(stop.lng).toFixed(4)}</span>
          </div>
          <button class="del-btn" onclick="remove(${i})">삭제</button>
        `;
        area.appendChild(item);
      });
    }

    // 목록에 임시 추가 (아직 서버 저장 안 됨)
    function addStopToList() {
      const name = document.getElementById('stopName').value;
      const lat = document.getElementById('stopLat').value;
      const lng = document.getElementById('stopLng').value;
      if(!name || !lat) return alert("정보를 입력하세요.");
      
      currentStops.push({ name, lat: Number(lat), lng: Number(lng) });
      renderList();
    }

    // 순서 이동
    function move(index, direction) {
      const target = index + direction;
      if (target < 0 || target >= currentStops.length) return;
      const temp = currentStops[index];
      currentStops[index] = currentStops[target];
      currentStops[target] = temp;
      renderList();
    }

    // 삭제
    function remove(index) {
      currentStops.splice(index, 1);
      renderList();
    }

    // 최종 서버 저장 (시트 덮어쓰기)
    function saveAllStopsToServer() {
      if(!confirm("현재 순서대로 구글 시트에 저장하시겠습니까?")) return;
      
      const url = `${GAS_URL}?action=saveAllStops&data=${encodeURIComponent(JSON.stringify(currentStops))}`;
      fetch(url).then(res => res.json()).then(data => {
        if(data.status === "Success") alert("최종 노선이 저장되었습니다!");
      });
    }

    window.onload = initMap;
  </script>
</body>
</html>
