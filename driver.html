<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>기사용 - 실시간 전송</title>
  <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
</head>
<body>
  <h2>1호차 운행 시작</h2>
  <button id="startBtn" onclick="toggleTracking()" style="padding:20px; font-size:20px;">위치 전송 시작</button>
  <div id="status">대기 중...</div>

  <script>
    // 파이어베이스 설정 (선생님의 정보로 교체하세요)
    const firebaseConfig = {
      apiKey: "AIzaSyBgvf-DLS7yHRaQQo_VBuD8Iq0OFpJNbFY",
      databaseURL: "https://schoolbus-d084b-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "schoolbus-d084b",
      appId: "1:827567571467:web:b3ee5370e972bc05f1bd0e"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let watchId = null;
    const busId = "1호차";

    function toggleTracking() {
      const btn = document.getElementById('startBtn');
      if (!watchId) {
        watchId = navigator.geolocation.watchPosition((pos) => {
          const updates = {
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            lastUpdate: new Date().getTime()
          };
          // 파이어베이스에 실시간 덮어쓰기
          database.ref('buses/' + busId).set(updates);
          document.getElementById('status').innerText = `전송 중... (${updates.lat.toFixed(4)})`;
        }, (err) => alert(err.message), { enableHighAccuracy: true });
        btn.innerText = "운행 종료";
      } else {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
        btn.innerText = "위치 전송 시작";
        document.getElementById('status').innerText = "운행 종료됨";
      }
    }
  </script>
</body>
</html>
